<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Telecom Bill Tracker (Secure)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        // Firebase কনফিগারেশন এখানে বসান
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI কন্ট্রোল
        const loginBtn = document.getElementById('loginBtn');
        const loginSection = document.getElementById('loginSection');
        const appSection = document.getElementById('appSection');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                loadData(user.uid);
            } else {
                loginSection.classList.remove('hidden');
                appSection.classList.add('hidden');
            }
        });

        // লগইন ফাংশন
        window.handleLogin = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("লগইন ভুল হয়েছে!"));
        };
    </script>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- লগইন সেকশন -->
    <div id="loginSection" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-md w-96">
            <h2 class="text-xl font-bold mb-4">লগইন করুন</h2>
            <input type="email" id="email" placeholder="ইমেইল" class="w-full border p-2 mb-2 rounded">
            <input type="password" id="password" placeholder="পাসওয়ার্ড" class="w-full border p-2 mb-4 rounded">
            <button onclick="handleLogin()" class="w-full bg-blue-700 text-white p-2 rounded">প্রবেশ করুন</button>
        </div>
    </div>

    <!-- অ্যাপ সেকশন (লগইন পর দেখা যাবে) -->
    <div id="appSection" class="hidden max-w-7xl mx-auto p-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">RH Telecom বিল ট্র্যাকার</h1>
            <button onclick="auth.signOut()" class="bg-red-500 text-white px-4 py-2 rounded">লগআউট</button>
        </header>
        <!-- আপনার আগের টেবিল কোড এখানে বসবে -->
    </div>
</body>
</html>
